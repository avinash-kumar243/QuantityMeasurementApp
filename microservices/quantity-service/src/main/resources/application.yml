server:
  port: ${PORT:8080}

spring:
  application:
    name: quantity-service

  boot:
    admin:
      client:
        url: http://localhost:9090

  datasource:
    url: jdbc:h2:mem:quantityservice
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always