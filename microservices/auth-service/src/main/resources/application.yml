server:
  port: 8081
  forward-headers-strategy: framework


jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000 # 1 hour

spring:
  application:
    name: AUTH-SERVICE


  # H2 Database
  datasource:
    url: jdbc:h2:mem:authservice
    driverClassName: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # OAuth2 & Security
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:8080/login/oauth2/code/{registrationId}"

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME} 
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true  
            
# Service Discovery (Eureka)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: "*"   # expose all endpoints
  endpoint:
    health:
      show-details: always

  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          prefer-ip: true