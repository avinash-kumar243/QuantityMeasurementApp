spring:
    application:
        name: Quantity Measurement App

    datasource:
        url: jdbc:h2:mem:quantitymeasurementdb
        driver-class-name: org.h2.Driver
        username: sa
        password:

    h2:
        console:
            enabled: true
            path: /h2-console

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        open-in-view: false
        properties:
            hibernate:
                format_sql: true

    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope:
                            - openid
                            - profile
                            - email

    autoconfigure:
        exclude:
            - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server:
    port: 8080

logging:
    level:
        root: INFO
        com.app.quantitymeasurement: DEBUG

management:
    endpoints:
        web:
            exposure:
                include: health,metrics

springdoc:
    swagger-ui:
        enabled: true
